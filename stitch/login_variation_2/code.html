<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Attendance - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-md">
<!-- Header / Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="bg-primary/10 p-4 rounded-full mb-4">
<span class="material-symbols-outlined text-primary text-5xl">school</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">Smart Attendance</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2">Academic Portal Access</p>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-xl shadow-primary/5 p-8 border border-slate-100 dark:border-slate-700">
<div class="mb-6">
<h2 class="text-xl font-semibold text-slate-900 dark:text-slate-100">Welcome Back</h2>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Please enter your credentials to continue.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<!-- Email Field -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-background-light dark:bg-background-dark border-transparent focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 transition-all" id="email" name="email" placeholder="name@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-background-light dark:bg-background-dark border-transparent focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember-me">Keep me signed in</label>
</div>
<!-- Sign In Button -->
<button class="w-full flex justify-center items-center py-3 px-4 rounded-lg bg-primary hover:bg-primary/90 text-white font-bold text-sm tracking-wide transition-colors shadow-lg shadow-primary/20" type="submit">
                    SIGN IN
                    <span class="material-symbols-outlined ml-2 text-lg">login</span>
</button>
</form>
<!-- Secondary Action -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-700 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    New student? 
                    <a class="text-primary font-semibold hover:underline" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Illustration / Background Detail (Optional subtle visual) -->
<div class="mt-12 opacity-40">
<div class="flex justify-center space-x-4">
<div class="h-1 w-12 bg-primary/40 rounded-full"></div>
<div class="h-1 w-12 bg-primary/40 rounded-full"></div>
<div class="h-1 w-12 bg-primary/40 rounded-full"></div>
</div>
</div>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="text-xs text-slate-400 dark:text-slate-500 uppercase tracking-widest font-medium">
                Version 2.0 • Security Encrypted
            </p>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
