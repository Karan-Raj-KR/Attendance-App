<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Attendance Capture - Smart Classroom</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .camera-overlay {
            background: linear-gradient(0deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.4) 100%);
        }
        .scan-line {
            height: 2px;
            background: #137fec;
            box-shadow: 0 0 8px #137fec;
            position: absolute;
            width: 100%;
            top: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h1 class="text-lg font-bold flex-1 text-center pr-10">Attendance Capture</h1>
</header>
<main class="flex-1 flex flex-col max-w-2xl mx-auto w-full p-4 gap-6">
<!-- Instruction Card -->
<div class="bg-primary/10 dark:bg-primary/20 p-4 rounded-xl border border-primary/20 flex items-start gap-3">
<span class="material-symbols-outlined text-primary">info</span>
<p class="text-sm font-medium leading-relaxed">
                Capture the classroom clearly so all student faces are visible. Ensure good lighting for better recognition.
            </p>
</div>
<!-- Camera Viewport Area -->
<div class="relative flex-1 min-h-[400px] w-full bg-slate-200 dark:bg-slate-800 rounded-2xl overflow-hidden shadow-inner border-2 border-slate-300 dark:border-slate-700">
<img alt="Classroom view" class="w-full h-full object-cover" data-alt="Perspective view of a modern bright classroom with desks" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCizNamc_pKTkfZlivqO4oPUwbzsLs1Z9HzpW5tshbu8eoYTqJ30NLUVv85SKxGSS20juVAbIKRbqfgbQE9A5Kax2kWtAG0ytAMmyyMPGZB51F4K4lY-SQO1VqNU99-CSp7OWOR5QN1o_lQvTIB-8FuFTDqRrs08GgDZFSQcPy4MPbYtSoBXC3FaQN-jGjFImvyB1fVlFkvG8RXFnK-4hpIy6BwvuPTKGvFWxHMlS9px5Ad76B3GWcml8YwalYWLcsl53ns2AkCWb8U"/>
<!-- Camera Overlays -->
<div class="absolute inset-0 camera-overlay pointer-events-none"></div>
<!-- Frame Corners -->
<div class="absolute top-6 left-6 w-12 h-12 border-t-4 border-l-4 border-white rounded-tl-lg opacity-80"></div>
<div class="absolute top-6 right-6 w-12 h-12 border-t-4 border-r-4 border-white rounded-tr-lg opacity-80"></div>
<div class="absolute bottom-6 left-6 w-12 h-12 border-b-4 border-l-4 border-white rounded-bl-lg opacity-80"></div>
<div class="absolute bottom-6 right-6 w-12 h-12 border-b-4 border-r-4 border-white rounded-br-lg opacity-80"></div>
<!-- Center Focus -->
<div class="absolute inset-0 flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-white text-6xl font-thin">filter_center_focus</span>
</div>
<div class="scan-line opacity-50"></div>
</div>
<!-- Action Controls -->
<div class="flex flex-col gap-4">
<div class="flex items-center justify-center gap-8 mb-4">
<button class="flex flex-col items-center gap-1 group">
<div class="size-12 rounded-full bg-white dark:bg-slate-800 shadow-md flex items-center justify-center text-slate-600 dark:text-slate-400 group-active:scale-95 transition-transform">
<span class="material-symbols-outlined">image</span>
</div>
<span class="text-xs font-semibold">Gallery</span>
</button>
<button class="size-20 rounded-full bg-primary text-white shadow-xl shadow-primary/30 flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-4xl">photo_camera</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="size-12 rounded-full bg-white dark:bg-slate-800 shadow-md flex items-center justify-center text-slate-600 dark:text-slate-400 group-active:scale-95 transition-transform">
<span class="material-symbols-outlined">refresh</span>
</div>
<span class="text-xs font-semibold">Flip</span>
</button>
</div>
<div class="flex flex-col gap-3">
<button class="w-full h-14 bg-primary text-white rounded-xl font-bold text-lg flex items-center justify-center gap-2 hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">capture</span>
                    Take Photo
                </button>
<button class="w-full h-14 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 rounded-xl font-bold text-lg flex items-center justify-center gap-2 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">upload</span>
                    Upload Photo
                </button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-3 pb-8 flex justify-between items-center mt-auto">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">photo_camera</span>
<span class="text-[10px] font-bold">Capture</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-bold">History</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold">Settings</span>
</a>
</nav>
</body></html>
